<!-- app/templates/upload.html -->
<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Subir Capítulo CBZ</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        
        .container {
            background: white;
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            max-width: 500px;
            width: 100%;
        }
        
        h1 {
            color: #333;
            margin-bottom: 30px;
            text-align: center;
        }
        
        .form-group {
            margin-bottom: 20px;
        }
        
        label {
            display: block;
            margin-bottom: 8px;
            color: #555;
            font-weight: 500;
        }
        
        input[type="text"],
        input[type="number"] {
            width: 100%;
            padding: 12px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 16px;
            transition: border 0.3s;
        }
        
        input:focus {
            outline: none;
            border-color: #667eea;
        }
        
        .file-input-wrapper {
            position: relative;
            overflow: hidden;
            display: inline-block;
            width: 100%;
        }
        
        .file-input-wrapper input[type=file] {
            position: absolute;
            left: -9999px;
        }
        
        .file-input-label {
            display: block;
            padding: 15px;
            background: #f5f5f5;
            border: 2px dashed #ccc;
            border-radius: 8px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s;
        }
        
        .file-input-label:hover {
            background: #ebebeb;
            border-color: #667eea;
        }
        
        .file-name {
            margin-top: 10px;
            color: #667eea;
            font-size: 14px;
            text-align: center;
        }
        
        button {
            width: 100%;
            padding: 15px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s;
        }
        
        button:hover:not(:disabled) {
            transform: translateY(-2px);
        }
        
        button:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }
        
        .result {
            margin-top: 20px;
            padding: 15px;
            border-radius: 8px;
            display: none;
        }
        
        .result.success {
            background: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
        }
        
        .result.error {
            background: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
        }
        
        .loading {
            text-align: center;
            margin-top: 20px;
            display: none;
        }
        
        .spinner {
            border: 3px solid #f3f3f3;
            border-top: 3px solid #667eea;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 0 auto;
        }
        
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>📚 Subir Capítulo CBZ</h1>
        
        <form id="uploadForm">
            <div class="form-group">
                <label>Nombre de la Serie</label>
                <input type="text" id="seriesName" placeholder="Ej: One Piece" required>
            </div>
            
            <div class="form-group">
                <label>Número de Capítulo</label>
                <input type="text" id="chapterNumber" placeholder="Ej: 1 o 1.5" required>
            </div>
            
            <div class="form-group">
                <label>Título (Opcional)</label>
                <input type="text" id="chapterTitle" placeholder="Ej: Romance Dawn">
            </div>
            
            <div class="form-group">
                <label>Archivo CBZ</label>
                <div class="file-input-wrapper">
                    <label class="file-input-label" for="fileInput">
                        📁 Seleccionar archivo .cbz
                    </label>
                    <input type="file" id="fileInput" accept=".cbz" required>
                </div>
                <div class="file-name" id="fileName"></div>
            </div>
            
            <button type="submit" id="submitBtn">Subir Capítulo</button>
        </form>
        
        <div class="loading" id="loading">
            <div class="spinner"></div>
            <p>Subiendo archivo...</p>
        </div>
        
        <div class="result" id="result"></div>
    </div>
    
    <script>
        const form = document.getElementById('uploadForm');
        const fileInput = document.getElementById('fileInput');
        const fileName = document.getElementById('fileName');
        const loading = document.getElementById('loading');
        const result = document.getElementById('result');
        const submitBtn = document.getElementById('submitBtn');
        
        // Mostrar nombre del archivo seleccionado
        fileInput.addEventListener('change', function() {
            if (this.files && this.files[0]) {
                fileName.textContent = '✓ ' + this.files[0].name;
            } else {
                fileName.textContent = '';
            }
        });
        
        // Manejar envío del formulario
        form.addEventListener('submit', async function(e) {
            e.preventDefault();
            
            const formData = new FormData();
            formData.append('file', fileInput.files[0]);
            formData.append('series_name', document.getElementById('seriesName').value);
            formData.append('chapter_number', document.getElementById('chapterNumber').value);
            formData.append('title', document.getElementById('chapterTitle').value);
            
            // Mostrar loading
            loading.style.display = 'block';
            result.style.display = 'none';
            submitBtn.disabled = true;
            
            try {
                const response = await fetch('/api/library/upload', {
                    method: 'POST',
                    body: formData
                });
                
                const data = await response.json();
                
                if (response.ok) {
                    result.className = 'result success';
                    result.innerHTML = `
                        <strong>✅ ¡Capítulo subido exitosamente!</strong><br><br>
                        <strong>Serie:</strong> ${data.series.name}<br>
                        <strong>Capítulo:</strong> ${data.chapter.chapter_number}<br>
                        <strong>Páginas:</strong> ${data.chapter.page_count}<br>
                        <strong>Slug:</strong> ${data.chapter.slug}<br><br>
                        <a href="/reader/${data.chapter.slug}" style="color: #155724; text-decoration: underline;">
                            👉 Leer ahora
                        </a>
                    `;
                    form.reset();
                    fileName.textContent = '';
                } else {
                    result.className = 'result error';
                    result.innerHTML = `<strong>❌ Error:</strong> ${data.error}`;
                }
                
                result.style.display = 'block';
                
            } catch (error) {
                result.className = 'result error';
                result.innerHTML = `<strong>❌ Error de conexión:</strong> ${error.message}`;
                result.style.display = 'block';
            } finally {
                loading.style.display = 'none';
                submitBtn.disabled = false;
            }
        });
    </script>
</body>
</html>
