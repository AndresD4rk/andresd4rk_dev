<!-- app/templates/library.html -->
<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Biblioteca CBZ</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%);
            min-height: 100vh;
            color: #333;
        }

        /* Header */
        .header {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            padding: 20px 0;
            box-shadow: 0 2px 20px rgba(0,0,0,0.1);
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .header-content {
            max-width: 1400px;
            margin: 0 auto;
            padding: 0 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .logo {
            font-size: 24px;
            font-weight: bold;
            color: #2a5298;
        }

        .header-actions {
            display: flex;
            gap: 15px;
        }

        .btn {
            padding: 10px 20px;
            border-radius: 8px;
            text-decoration: none;
            font-weight: 500;
            transition: all 0.3s;
            border: none;
            cursor: pointer;
            font-size: 14px;
        }

        .btn-primary {
            background: #2a5298;
            color: white;
        }

        .btn-primary:hover {
            background: #1e3c72;
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(42, 82, 152, 0.4);
        }

        .btn-secondary {
            background: #f0f0f0;
            color: #333;
        }

        .btn-secondary:hover {
            background: #e0e0e0;
        }

        /* Search Bar */
        .search-section {
            max-width: 1400px;
            margin: 30px auto;
            padding: 0 20px;
        }

        .search-bar {
            display: flex;
            gap: 15px;
            background: white;
            padding: 20px;
            border-radius: 12px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.1);
        }

        .search-input {
            flex: 1;
            padding: 12px 20px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 16px;
            transition: border 0.3s;
        }

        .search-input:focus {
            outline: none;
            border-color: #2a5298;
        }

        .filter-select {
            padding: 12px 20px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 14px;
            background: white;
            cursor: pointer;
        }

        /* Main Content */
        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 20px;
        }

        .stats {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .stat-card {
            background: white;
            padding: 20px;
            border-radius: 12px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.1);
            text-align: center;
        }

        .stat-number {
            font-size: 32px;
            font-weight: bold;
            color: #2a5298;
        }

        .stat-label {
            color: #666;
            margin-top: 5px;
        }

        /* Series Grid */
        .series-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 25px;
            margin-top: 30px;
        }

        .series-card {
            background: white;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 4px 20px rgba(0,0,0,0.1);
            transition: all 0.3s;
            cursor: pointer;
            text-decoration: none;
            color: inherit;
        }

        .series-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 8px 30px rgba(0,0,0,0.2);
        }

        .series-cover {
            width: 100%;
            height: 280px;
            object-fit: cover;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 48px;
        }

        .series-cover img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .series-info {
            padding: 15px;
        }

        .series-name {
            font-size: 16px;
            font-weight: 600;
            margin-bottom: 8px;
            color: #333;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .series-meta {
            display: flex;
            justify-content: space-between;
            font-size: 13px;
            color: #666;
        }

        .chapter-count {
            color: #2a5298;
            font-weight: 500;
        }

        /* Empty State */
        .empty-state {
            text-align: center;
            padding: 60px 20px;
            background: white;
            border-radius: 12px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.1);
        }

        .empty-state-icon {
            font-size: 64px;
            margin-bottom: 20px;
        }

        .empty-state h2 {
            color: #333;
            margin-bottom: 10px;
        }

        .empty-state p {
            color: #666;
            margin-bottom: 20px;
        }

        /* Loading */
        .loading {
            text-align: center;
            padding: 40px;
        }

        .spinner {
            width: 50px;
            height: 50px;
            border: 4px solid rgba(255,255,255,0.3);
            border-top-color: white;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto 20px;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        /* Responsive */
        @media (max-width: 768px) {
            .header-content {
                flex-direction: column;
                gap: 15px;
            }

            .search-bar {
                flex-direction: column;
            }

            .series-grid {
                grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
                gap: 15px;
            }

            .series-cover {
                height: 220px;
            }
        }
    </style>
</head>
<body>
    <!-- Header -->
    <header class="header">
        <div class="header-content">
            <div class="logo">📚 Mi Biblioteca CBZ</div>
            <div class="header-actions">
                <a href="/upload" class="btn btn-primary">➕ Subir Capítulo</a>
                <button class="btn btn-secondary" onclick="location.reload()">🔄 Actualizar</button>
            </div>
        </div>
    </header>

    <!-- Search Section -->
    <div class="search-section">
        <div class="search-bar">
            <input 
                type="text" 
                class="search-input" 
                id="searchInput" 
                placeholder="🔍 Buscar series..."
                autocomplete="off"
            >
            <select class="filter-select" id="sortSelect">
                <option value="name">Ordenar por nombre</option>
                <option value="chapters">Ordenar por capítulos</option>
                <option value="recent">Más recientes</option>
            </select>
        </div>
    </div>

    <!-- Main Content -->
    <div class="container">
        <!-- Stats -->
        <div class="stats">
            <div class="stat-card">
                <div class="stat-number" id="totalSeries">0</div>
                <div class="stat-label">Series</div>
            </div>
            <div class="stat-card">
                <div class="stat-number" id="totalChapters">0</div>
                <div class="stat-label">Capítulos</div>
            </div>
        </div>

        <!-- Series Grid -->
        <div id="seriesContainer">
            <div class="loading">
                <div class="spinner"></div>
                <p style="color: white;">Cargando biblioteca...</p>
            </div>
        </div>
    </div>

    <script>
        let allSeries = [];

        // Cargar series al iniciar
        async function loadLibrary() {
            try {
                const response = await fetch('/api/library/series');
                const series = await response.json();
                
                allSeries = series;
                displaySeries(series);
                updateStats(series);
                
            } catch (error) {
                console.error('Error loading library:', error);
                document.getElementById('seriesContainer').innerHTML = `
                    <div class="empty-state">
                        <div class="empty-state-icon">⚠️</div>
                        <h2>Error al cargar la biblioteca</h2>
                        <p>${error.message}</p>
                        <button class="btn btn-primary" onclick="location.reload()">Reintentar</button>
                    </div>
                `;
            }
        }

        // Mostrar series
        function displaySeries(series) {
            const container = document.getElementById('seriesContainer');
            
            if (series.length === 0) {
                container.innerHTML = `
                    <div class="empty-state">
                        <div class="empty-state-icon">📚</div>
                        <h2>No hay series todavía</h2>
                        <p>Comienza subiendo tu primer capítulo</p>
                        <a href="/upload" class="btn btn-primary">Subir Capítulo</a>
                    </div>
                `;
                return;
            }

            const grid = document.createElement('div');
            grid.className = 'series-grid';

            series.forEach(s => {
                const card = document.createElement('a');
                card.className = 'series-card';
                card.href = `/series/${s.slug}`;
                
                card.innerHTML = `
                    <div class="series-cover">
                        ${s.cover_url 
                            ? `<img src="${s.cover_url}" alt="${s.name}">` 
                            : `📖`
                        }
                    </div>
                    <div class="series-info">
                        <div class="series-name" title="${s.name}">${s.name}</div>
                        <div class="series-meta">
                            <span class="chapter-count">${s.chapter_count} cap${s.chapter_count !== 1 ? 's' : ''}</span>
                        </div>
                    </div>
                `;
                
                grid.appendChild(card);
            });

            container.innerHTML = '';
            container.appendChild(grid);
        }

        // Actualizar estadísticas
        function updateStats(series) {
            document.getElementById('totalSeries').textContent = series.length;
            
            const totalChapters = series.reduce((sum, s) => sum + s.chapter_count, 0);
            document.getElementById('totalChapters').textContent = totalChapters;
        }

        // Búsqueda
        document.getElementById('searchInput').addEventListener('input', function(e) {
            const query = e.target.value.toLowerCase();
            const filtered = allSeries.filter(s => 
                s.name.toLowerCase().includes(query)
            );
            displaySeries(filtered);
        });

        // Ordenamiento
        document.getElementById('sortSelect').addEventListener('change', function(e) {
            const sorted = [...allSeries];
            
            switch(e.target.value) {
                case 'name':
                    sorted.sort((a, b) => a.name.localeCompare(b.name));
                    break;
                case 'chapters':
                    sorted.sort((a, b) => b.chapter_count - a.chapter_count);
                    break;
                case 'recent':
                    sorted.sort((a, b) => b.id - a.id);
                    break;
            }
            
            displaySeries(sorted);
        });

        // Inicializar
        loadLibrary();
    </script>
</body>
</html>
